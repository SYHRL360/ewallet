server.port=8080

springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.operationsSorter=method

app.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:e_wallet}?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
app.datasource.username=${MYSQLUSER:root}
app.datasource.password=${MYSQLPASSWORD:55555}
app.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
app.datasource.configuration.maximum-pool-size=30


spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB
spring.servlet.multipart.location=${java.io.tmpdir}